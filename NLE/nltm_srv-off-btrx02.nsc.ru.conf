# Ansible managed
# create virtual hosts for NTLM 
# site: default
#
<VirtualHost *:8890>

    ServerAdmin webmaster@localhost
    ServerName ourtricolortv.nsc.ru
    ServerAlias *.ourtricolortv.nsc.ru b24.tricolormedia.ru
	DocumentRoot /home/bitrix/www
	KeepAlive On

	# Possible values include: debug, info, notice, warn, error, crit, alert, emerg.
	LogLevel warn
	ErrorLog logs/default_error_log
    #CustomLog logs/default_access_log combined
    #

    <Directory />
        Options FollowSymLinks
        AllowOverride None
    </Directory>

    <DirectoryMatch .*\.(svn|git|hg)/.*>
    Require all denied
        </DirectoryMatch>

    <DirectoryMatch /home/bitrix/www/bitrix/(cache|managed_cache|local_cache|stack_cache)>
        AllowOverride none
        AddType text/plain php,php3,php4,php5,php6,phtml,pl,asp,aspx,cgi,dll,exe,ico,shtm,shtml,fcg,fcgi,fpl,asmx,pht
        php_value engine off
    </DirectoryMatch>

    <DirectoryMatch /home/bitrix/www/(upload|bitrix/images|bitrix/tmp)>
        AllowOverride none
        AddType text/plain php,php3,php4,php5,php6,phtml,pl,asp,aspx,cgi,dll,exe,ico,shtm,shtml,fcg,fcgi,fpl,asmx,pht
        php_value engine off
    </DirectoryMatch>

	<Directory /home/bitrix/www/>
		Options FollowSymLinks MultiViews
		AllowOverride All
		DirectoryIndex index.php index.html index.htm

		AuthName "NTLM Authentication thingy"
		NTLMAuth on
		NTLMAuthHelper "/usr/bin/ntlm_auth --helper-protocol=squid-2.5-ntlmssp"
		NTLMBasicAuthoritative on
		AuthType NTLM
		# Bypass NTLM for the terminal server so users from trusted domains
		# fall back to the Bitrix form/basic authorization instead of waiting
		# for the NTLM helper timeout.
		<RequireAny>
			Require ip 172.22.74.11
			Require valid-user
		</RequireAny>

		php_admin_value session.save_path /tmp/php_sessions/www
		php_admin_value upload_tmp_dir /tmp/php_upload/www
	</Directory>

    <Directory /home/bitrix/www/upload/support/not_image>
        AllowOverride none
        Require all denied
            </Directory>

</VirtualHost>

<VirtualHost *:8891>
	ServerAdmin webmaster@localhost
    ServerName ourtricolortv.nsc.ru
    ServerAlias *.ourtricolortv.nsc.ru b24.tricolormedia.ru
	DocumentRoot /home/bitrix/www
	KeepAlive On
  
	# Possible values include: debug, info, notice, warn, error, crit, alert, emerg.
	LogLevel warn
	ErrorLog logs/default_error_log
  #CustomLog logs/default_access_log combined

	SSLEngine on
	SSLProtocol all -SSLv2
