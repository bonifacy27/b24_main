# Ansible managed
# Additional website http
server {
    listen 80 ;
  
    server_name ourtricolortv.nsc.ru www.ourtricolortv.nsc.ru;
  
  access_log /var/log/nginx/ourtricolortv_access.log main;
  error_log  /var/log/nginx/ourtricolortv_error.log warn;

  #charset utf-8;
  server_name_in_redirect off;

  #proxy_ssl_server_name on;

  proxy_set_header	X-Real-IP $remote_addr;
  proxy_set_header	X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header	Host $host:80;

    set $proxyserver  "http://127.0.0.1:8887";
  
    set $imcontenttype	"text/html; charset=utf-8";
    set $docroot		"/home/bitrix/www";

  index index.php;
  root "/home/bitrix/www";

  # Redirect to ssl if need
    if (-f /home/bitrix/www/.htsecure) { rewrite ^(.*)$ https://$host$1 permanent; }
  
  # Include parameters common to all websites
  include bx/conf/bitrix.conf;

  # Include munin and nagios web
  include bx/server_monitor.conf;
}
